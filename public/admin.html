<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin ProControl</title>

<style>
body{
margin:0;
font-family:Arial;
background:#06142b;
color:white;
padding:25px;
}
.box{
background:#162845;
padding:22px;
border-radius:18px;
margin-bottom:20px;
}
h1,h2{margin-top:0}
input{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:12px;
margin-bottom:10px;
}
button{
padding:14px 18px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-right:6px;
margin-bottom:6px;
}
.blue{background:#2e6cff;color:white;}
.green{background:#19c15f;color:white;}
.red{background:#ff4c4c;color:white;}
.gray{background:#4e5f80;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}
td,th{
padding:12px;
border-bottom:1px solid #31486e;
text-align:left;
vertical-align:top;
}
#panel{display:none;}
.small{font-size:13px;opacity:.8;}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h1>🔒 Connexion Admin</h1>

<input id="user" value="admin" placeholder="Utilisateur">
<input id="pass" type="password" placeholder="Mot de passe">

<button class="blue" onclick="login()">Connexion</button>
</div>

<div id="panel">

<div class="box">
<h1>🛠️ Admin ProControl</h1>
<button class="blue" onclick="load()">Actualiser</button>
<button class="gray" onclick="logout()">Déconnexion</button>
</div>

<div class="box">
<h2>Ajouter outil</h2>
<input id="toolName" placeholder="Nom outil">
<button class="green" onclick="addTool()">Ajouter</button>
</div>

<div class="box">
<h2>Ajouter utilisateur</h2>
<input id="userName" placeholder="Prénom">
<input id="userPin" placeholder="PIN">
<button class="green" onclick="addUser()">Ajouter</button>
</div>

<div class="box">
<h2>🧰 Outils</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nom</th>
<th>Statut</th>
<th>Utilisateur</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tools"></tbody>
</table>
</div>

<div class="box">
<h2>👤 Utilisateurs</h2>

<table>
<thead>
<tr>
<th>Nom</th>
<th>PIN</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="users"></tbody>
</table>
</div>

</div>

<script>

let ADMIN_USER="";
let ADMIN_PASS="";

/* ===== LOGIN ===== */

function login(){

ADMIN_USER =
document.getElementById("user").value.trim();

ADMIN_PASS =
document.getElementById("pass").value.trim();

if(!ADMIN_USER || !ADMIN_PASS){
alert("Login requis");
return;
}

sessionStorage.setItem("adminUser",ADMIN_USER);
sessionStorage.setItem("adminPass",ADMIN_PASS);

document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";

load();
}

function restore(){

ADMIN_USER =
sessionStorage.getItem("adminUser") || "";

ADMIN_PASS =
sessionStorage.getItem("adminPass") || "";

if(ADMIN_USER && ADMIN_PASS){

document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";

load();
}
}

function logout(){

sessionStorage.clear();
location.reload();
}

function auth(){
return `user=${encodeURIComponent(ADMIN_USER)}&pass=${encodeURIComponent(ADMIN_PASS)}`;
}

/* ===== LOAD ===== */

async function load(){

const r = await fetch('/api/admin');
const data = await r.json();

/* tools */

let html='';

data.tools.forEach(t=>{

html += `
<tr>
<td>${t.id}</td>
<td>${t.nom}</td>
<td>${t.en_cours?'🔴 Pris':'🟢 Libre'}</td>
<td>${t.emprunteur||'-'}</td>

<td>

<button class="blue"
onclick="openQR('${t.id}')">
QR
</button>

<button class="gray"
onclick="copyLink('${t.id}')">
Lien
</button>

<button class="red"
onclick="delTool('${t.id}')">
Supprimer
</button>

</td>
</tr>
`;

});

document.getElementById("tools").innerHTML = html;

/* users */

html='';

data.users.forEach(u=>{

html += `
<tr>
<td>${u.nom}</td>
<td>${u.pin}</td>

<td>
<button class="red"
onclick="delUser('${u.id}')">
Supprimer
</button>
</td>

</tr>
`;

});

document.getElementById("users").innerHTML = html;
}

/* ===== ADD TOOL ===== */

async function addTool(){

const nom =
document.getElementById("toolName").value;

const r = await fetch(
'/api/add-tool?'+auth()+
'&nom='+
encodeURIComponent(nom)
);

const txt = await r.text();

document.getElementById("toolName").value='';

alert(txt);

load();
}

/* ===== ADD USER ===== */

async function addUser(){

const nom =
document.getElementById("userName").value;

const pin =
document.getElementById("userPin").value;

const r = await fetch(
'/api/add-user-admin?'+auth()+
'&nom='+
encodeURIComponent(nom)+
'&pin='+pin
);

alert(await r.text());

document.getElementById("userName").value='';
document.getElementById("userPin").value='';

load();
}

/* ===== DELETE ===== */

async function delTool(id){

if(!confirm("Supprimer outil ?")) return;

await fetch(
'/api/delete-tool?'+auth()+
'&id='+id
);

load();
}

async function delUser(id){

if(!confirm("Supprimer utilisateur ?")) return;

await fetch(
'/api/delete-user?'+auth()+
'&id='+id
);

load();
}

/* ===== QR ===== */

function openQR(id){
window.open('/qrcode/'+id,'_blank');
}

async function copyLink(id){

const url =
window.location.origin+
'/outil.html?tool='+id;

await navigator.clipboard.writeText(url);

alert("Lien copié");
}

restore();

</script>

</body>
</html>
