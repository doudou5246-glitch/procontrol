<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ProControl App</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#07162c;
color:white;
padding:20px;
}
.box{
background:#162845;
padding:20px;
border-radius:18px;
margin-bottom:18px;
}
h1,h2{margin-top:0}
input,select{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:12px;
margin-bottom:10px;
}
button{
width:100%;
padding:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}
.blue{background:#2f6cff;color:white;}
.green{background:#19c15f;color:white;}
.red{background:#ff4b4b;color:white;}
.gray{background:#50617f;color:white;}

.tool{
background:#24395f;
padding:12px;
border-radius:12px;
margin-top:8px;
}

.small{
opacity:.8;
font-size:14px;
}

/* CAMERA FULLSCREEN */
#scanLayer{
display:none;
position:fixed;
inset:0;
background:black;
z-index:9999;
padding:10px;
}

#reader{
width:100%;
height:100%;
}

#closeScan{
position:absolute;
top:15px;
right:15px;
width:auto;
padding:12px 16px;
z-index:10000;
}
</style>
</head>

<body>

<div class="box">
<h1>📱 ProControl</h1>
<div id="status">Non connecté</div>
</div>

<div class="box">
<h2>Connexion</h2>

<select id="nom"></select>
<input id="pin" type="password" placeholder="PIN">

<button class="blue" onclick="login()">Se connecter</button>
<button class="gray" onclick="logout()">Changer utilisateur</button>
<button class="green" onclick="createUser()">Créer profil</button>
</div>

<div class="box">
<h2>Prendre / rendre outil</h2>

<input id="tool" placeholder="Nom outil / ID / QR">

<button class="blue" onclick="startQR()">📷 Scanner QR</button>

<button class="green" onclick="takeTool()">Prendre outil</button>
<button class="red" onclick="returnTool()">Rendre outil</button>

<div class="small">
Le QR mémorise l'outil automatiquement.
</div>
</div>

<div class="box">
<h2>Mes outils</h2>

<button class="blue" onclick="loadMine()">Actualiser</button>
<button class="red" onclick="returnAll()">Tout rendre</button>

<div id="mine"></div>
</div>

<!-- CAMERA FULLSCREEN -->
<div id="scanLayer">
<button id="closeScan" class="red" onclick="stopQR()">Fermer</button>
<div id="reader"></div>
</div>

<script>
let user="";
let pin="";
let data={tools:[],users:[]};
let qrScanner=null;

/* ===== LOAD ===== */

async function refreshData(){

const r = await fetch('/api/admin');
data = await r.json();

fillUsers();
}

/* ===== USERS ===== */

function fillUsers(){

let html="";

(data.users || []).forEach(u=>{
html += `<option value="${u.nom}">${u.nom}</option>`;
});

document.getElementById("nom").innerHTML = html;

const last = localStorage.getItem("pc_user");

if(last){
document.getElementById("nom").value = last;
}
}

/* ===== LOGIN ===== */

function login(){

user =
document.getElementById("nom").value.trim();

pin =
document.getElementById("pin").value.trim();

if(!user || !pin){
alert("Nom + PIN");
return;
}

sessionStorage.setItem("pc_user",user);
sessionStorage.setItem("pc_pin",pin);
localStorage.setItem("pc_user",user);

document.getElementById("status").innerHTML =
"✅ Connecté : "+user;

/* si QR avait déjà mis outil */
const pending =
sessionStorage.getItem("pending_tool");

if(pending){
document.getElementById("tool").value = pending;
}

loadMine();
}

function restore(){

user =
sessionStorage.getItem("pc_user") || "";

pin =
sessionStorage.getItem("pc_pin") || "";

if(user){
document.getElementById("status").innerHTML =
"✅ Connecté : "+user;
}
}

function logout(){

sessionStorage.clear();

user="";
pin="";

document.getElementById("status").innerHTML =
"Non connecté";
}

/* ===== CREATE USER ===== */

async function createUser(){

const nom = prompt("Prénom ?");
if(!nom) return;

const code = prompt("PIN ?");
if(!code) return;

const r = await fetch(
'/api/add-user-admin?nom='+
encodeURIComponent(nom)+
'&pin='+code
);

alert(await r.text());

await refreshData();

document.getElementById("nom").value = nom;
}

/* ===== FIND TOOL ===== */

function norm(x){
return String(x||"")
.toLowerCase()
.trim()
.replace(/\s+/g," ");
}

function findTool(){

let value =
norm(document.getElementById("tool").value);

if(!value) return null;

/* id */
let t = data.tools.find(x =>
String(x.id) === value
);
if(t) return t;

/* exact */
t = data.tools.find(x =>
norm(x.nom) === value
);
if(t) return t;

/* partial */
t = data.tools.find(x =>
norm(x.nom).includes(value)
);
if(t) return t;

return null;
}

/* ===== TAKE ===== */

async function takeTool(){

if(!user || !pin){
alert("Connecte-toi");
return;
}

await refreshData();

const t = findTool();

if(!t){
alert("Outil introuvable");
return;
}

const r = await fetch(
'/api/take?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+t.id
);

alert(await r.text());

await refreshData();
await loadMine();
}

/* ===== RETURN ===== */

async function returnTool(){

if(!user || !pin){
alert("Connecte-toi");
return;
}

await refreshData();

const t = findTool();

if(!t){
alert("Outil introuvable");
return;
}

const r = await fetch(
'/api/return?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+t.id
);

alert(await r.text());

await refreshData();
await loadMine();
}

/* ===== MY TOOLS ===== */

async function loadMine(){

await refreshData();

let mine =
data.tools.filter(t =>
t.emprunteur === user
);

let html="";

mine.forEach(t=>{

html += `
<div class="tool">
<b>${t.nom}</b><br>
<button class="red"
onclick="quickReturn('${t.id}')">
Rendre
</button>
</div>
`;

});

document.getElementById("mine").innerHTML =
html || "Aucun outil";
}

async function quickReturn(id){

await fetch(
'/api/return?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+id
);

loadMine();
}

async function returnAll(){

await refreshData();

let mine =
data.tools.filter(t =>
t.emprunteur === user
);

for(const t of mine){

await fetch(
'/api/return?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+t.id
);

}

alert("Tout rendu");

loadMine();
}

/* ===== QR ===== */

function extractValue(text){

try{
const url = new URL(text);

const id =
url.searchParams.get("tool") ||
url.searchParams.get("id");

if(id) return id;

}catch(e){}

return text;
}

async function startQR(){

if(qrScanner) return;

document.getElementById("scanLayer").style.display="block";

qrScanner =
new Html5Qrcode("reader");

await qrScanner.start(
{ facingMode:"environment" },
{
fps:10,
qrbox:{width:260,height:260}
},

(decodedText)=>{

const val =
extractValue(decodedText);

document.getElementById("tool").value = val;

/* mémorise */
sessionStorage.setItem(
"pending_tool",
val
);

stopQR();
}
);
}

async function stopQR(){

if(qrScanner){

await qrScanner.stop();
await qrScanner.clear();

qrScanner=null;
}

document.getElementById("scanLayer").style.display="none";
}

/* ===== INIT ===== */

async function init(){

await refreshData();

restore();

/* qr lien direct */
const params =
new URLSearchParams(location.search);

const tool =
params.get("tool") ||
params.get("id");

if(tool){

document.getElementById("tool").value =
tool;

sessionStorage.setItem(
"pending_tool",
tool
);
}

if(user){
loadMine();
}
}

init();
</script>

</body>
</html>
