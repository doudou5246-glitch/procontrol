<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin ProControl</title>

<style>
body{
margin:0;
font-family:Arial;
background:#07152f;
color:white;
padding:30px;
}
.box{
background:#13284d;
padding:25px;
border-radius:18px;
margin-bottom:25px;
}
input{
padding:14px;
border:none;
border-radius:12px;
width:260px;
margin:5px;
font-size:16px;
}
button{
padding:14px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin:5px;
}
.blue{background:#2d6cff;color:white;}
.green{background:#18b84f;color:white;}
.red{background:#d73a3a;color:white;}
table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}
td,th{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.1);
text-align:left;
}
</style>
</head>

<body>

<div class="box">
<h1>🔒 Admin ProControl</h1>

<input id="user" placeholder="Identifiant" value="admin">
<input id="pass" placeholder="Mot de passe" value="admin123">
<button class="blue" onclick="load()">Connexion</button>
</div>

<div class="box">
<h2>➕ Ajouter outil</h2>
<input id="toolName" placeholder="Nom outil">
<button class="green" onclick="addTool()">Ajouter</button>
</div>

<div class="box">
<h2>👤 Ajouter utilisateur</h2>
<input id="userName" placeholder="Nom">
<input id="userPin" placeholder="PIN">
<button class="green" onclick="addUser()">Ajouter</button>
</div>

<div class="box">
<h2>🧰 Outils</h2>
<div id="tools"></div>
</div>

<div class="box">
<h2>👥 Utilisateurs</h2>
<div id="users"></div>
</div>

<script>

function creds(){
return {
user:document.getElementById("user").value,
pass:document.getElementById("pass").value
};
}

async function load(){

const c=creds();

const r=await fetch(`/api/admin?user=${c.user}&pass=${c.pass}`);
const data=await r.json();

if(data.error){
alert(data.error);
return;
}

renderTools(data.tools || []);
renderUsers(data.users || []);
}

function renderTools(list){

let html="<table><tr><th>ID</th><th>Nom</th><th>Statut</th><th>Action</th></tr>";

list.forEach(t=>{

html+=`
<tr>
<td>${t.id}</td>
<td>${t.nom}</td>
<td>${t.en_cours ? "Pris par "+t.emprunteur : "Libre"}</td>
<td><button class="red" onclick="deleteTool(${t.id})">Supprimer</button></td>
</tr>
`;

});

html+="</table>";

document.getElementById("tools").innerHTML=html;
}

function renderUsers(list){

let html="<table><tr><th>Nom</th><th>PIN</th><th>Action</th></tr>";

list.forEach(u=>{

html+=`
<tr>
<td>${u.nom}</td>
<td>${u.pin}</td>
<td><button class="red" onclick="deleteUser('${u.nom}')">Supprimer</button></td>
</tr>
`;

});

html+="</table>";

document.getElementById("users").innerHTML=html;
}

async function addTool(){

const nom=document.getElementById("toolName").value;

await fetch(`/api/add-tool?nom=${encodeURIComponent(nom)}`);

load();
}

async function addUser(){

const nom=document.getElementById("userName").value;
const pin=document.getElementById("userPin").value;

await fetch(`/api/add-user?nom=${encodeURIComponent(nom)}&pin=${pin}`);

load();
}

async function deleteTool(id){

await fetch(`/api/delete-tool?id=${id}`);

load();
}

async function deleteUser(nom){

await fetch(`/api/delete-user?nom=${encodeURIComponent(nom)}`);

load();
}

load();

</script>
</body>
</html>
