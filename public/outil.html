<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Outil</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      max-width: 350px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px;
      margin: 10px;
      width: 40%;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .prendre {
      background: #22c55e;
      color: white;
    }

    .rendre {
      background: #ef4444;
      color: white;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🔧 Outil</h1>

  <input id="nom" placeholder="Ton prénom">
  <input id="pin" placeholder="Code PIN" type="password">

  <br>

  <button class="prendre" onclick="prendre()">Prendre</button>
  <button class="rendre" onclick="rendre()">Rendre</button>

  <div id="result"></div>
</div>

<script>
  // au chargement
window.onload = () => {
  const savedName = localStorage.getItem("nom");
  if (savedName) {
    document.getElementById("nom").value = savedName;
  }
};
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function prendre() {
  const nom = document.getElementById("nom").value;
  const pin = document.getElementById("pin").value;

  const res = await fetch(`/api/take?id=${id}&nom=${nom}&pin=${pin}`);
  const txt = await res.text();

  document.getElementById("result").innerText = txt;
}

async function rendre() {
  const nom = document.getElementById("nom").value;
  const pin = document.getElementById("pin").value;

  const res = await fetch(`/api/return?id=${id}&nom=${nom}&pin=${pin}`);
  const txt = await res.text();

  document.getElementById("result").innerText = txt;
}
</script>

</body>
</html>
