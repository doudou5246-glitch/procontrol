<!DOCTYPE html>
<html>
<head>
  <title>ProControl</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 48%;
      padding: 12px;
      margin: 5px 1%;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .prendre {
      background: #ef4444;
      color: white;
    }

    .rendre {
      background: #22c55e;
      color: white;
    }

    .card {
      background: #1e293b;
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>🔧 ProControl</header>

<div class="container">

  <input id="nom" placeholder="Nom">
  <input id="pin" placeholder="PIN">
  <input id="id" placeholder="ID outil">

  <div>
    <button class="prendre" onclick="prendre()">Prendre</button>
    <button class="rendre" onclick="rendre()">Rendre</button>
  </div>

  <div class="card">
    <h3>📦 Suivi du matériel</h3>
    <button onclick="load()">Actualiser</button>
    <div id="list"></div>
  </div>

</div>

<script>

async function prendre() {
  const nom = document.getElementById("nom").value;
  const pin = document.getElementById("pin").value;
  const id = document.getElementById("id").value;

  const res = await fetch(`/api/take?id=${id}&nom=${nom}&pin=${pin}`);
  alert(await res.text());
}

async function rendre() {
  const nom = document.getElementById("nom").value;
  const pin = document.getElementById("pin").value;
  const id = document.getElementById("id").value;

  const res = await fetch(`/api/return?id=${id}&nom=${nom}&pin=${pin}`);
  alert(await res.text());
}

async function load() {
  const res = await fetch("/api/admin");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.tools.forEach(t => {
    list.innerHTML += `
      <div>
        🔧 ${t.nom} :
        ${t.en_cours ? "🔴 Pris par " + t.emprunteur : "🟢 Libre"}
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
