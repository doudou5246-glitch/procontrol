<!DOCTYPE html>
<html>
<head>
  <title>Admin ProControl</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }
    th {
      background: #333;
      color: white;
    }
    .pris {
      color: red;
      font-weight: bold;
    }
    .libre {
      color: green;
    }
  </style>
</head>

<body>

<h1>📦 Gestion matériel</h1>

<table id="table">
  <tr>
    <th>ID</th>
    <th>Nom</th>
    <th>Statut</th>
    <th>Utilisateur</th>
  </tr>
</table>

<script>
async function load() {
  const res = await fetch("/api/admin/tools");
  const data = await res.json();

  const table = document.getElementById("table");

  data.forEach(tool => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${tool.id}</td>
      <td>${tool.nom}</td>
      <td class="${tool.en_cours ? 'pris' : 'libre'}">
        ${tool.en_cours ? 'Pris' : 'Libre'}
      </td>
      <td>${tool.emprunteur || "-"}</td>
    `;

    table.appendChild(tr);
  });
}

load();
</script>

</body>
</html>
