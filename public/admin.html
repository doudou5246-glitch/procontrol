<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 90%;
      margin-top: 30px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 10px;
    }

    th {
      background: #1e293b;
    }

    tr:nth-child(even) {
      background: #1e293b;
    }
  </style>
</head>

<body>

<h1>📊 Suivi matériel</h1>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Emprunteur</th>
      <th>Status</th>
      <th>Date</th>
    </tr>
  </thead>

  <tbody id="data"></tbody>
</table>

<script>
async function load() {
  const res = await fetch("/api/admin/tools");
  const data = await res.json();

  let html = "";

  data.forEach(t => {
    html += `
      <tr>
        <td>${t.id}</td>
        <td>${t.nom}</td>
        <td>${t.emprunteur || "-"}</td>
        <td>${t.en_cours ? "🔴 Pris" : "🟢 Disponible"}</td>
        <td>${t.date_sortie || "-"}</td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

load();
</script>

</body>
</html>
