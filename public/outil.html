<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ProControl App</title>

<style>
body{
margin:0;
font-family:Arial;
background:#07162c;
color:white;
padding:20px;
}
.box{
background:#162845;
padding:22px;
border-radius:18px;
margin-bottom:18px;
}
h1,h2{margin-top:0}
input,select{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
margin-bottom:10px;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
margin-bottom:10px;
cursor:pointer;
}
.blue{background:#2e6cff;color:white;}
.green{background:#19c15f;color:white;}
.red{background:#ff4c4c;color:white;}
.gray{background:#4b5d7d;color:white;}
.small{font-size:14px;opacity:.8;}
</style>
</head>

<body>

<div class="box">
<h1>📱 ProControl</h1>
<div id="status">Non connecté</div>
</div>

<div class="box">
<h2>Connexion</h2>

<select id="nom"></select>
<input id="pin" placeholder="PIN">

<button class="blue" onclick="login()">Se connecter</button>
<button class="gray" onclick="changeUser()">Changer d'utilisateur</button>
<button class="green" onclick="createUser()">Créer un profil depuis l'appli</button>
</div>

<div class="box">
<h2>Scanner / saisir outil</h2>

<input id="toolId" placeholder="ID outil">

<button class="green" onclick="takeTool()">Prendre outil</button>
<button class="red" onclick="returnTool()">Rendre outil</button>

<div class="small">
Scanner QR plus tard ou taper l'ID outil.
</div>
</div>

<script>
let user="";
let pin="";

/* ========= LOAD USERS ========= */

async function loadUsers(){
const r = await fetch('/api/admin');
const data = await r.json();

let html='';

data.users.forEach(u=>{
html += `<option value="${u.nom}">${u.nom}</option>`;
});

document.getElementById("nom").innerHTML = html;

const last = localStorage.getItem("pc_user");
if(last){
document.getElementById("nom").value = last;
}
}

/* ========= LOGIN ========= */

function login(){

user = document.getElementById("nom").value;
pin = document.getElementById("pin").value;

if(!user || !pin){
alert("Nom + PIN");
return;
}

localStorage.setItem("pc_user", user);

document.getElementById("status").innerHTML =
"✅ Connecté : "+user;
}

/* ========= CHANGE USER ========= */

function changeUser(){
localStorage.removeItem("pc_user");
document.getElementById("pin").value="";
document.getElementById("status").innerHTML="Non connecté";
}

/* ========= CREATE USER ========= */

async function createUser(){

const nom = prompt("Prénom ?");
if(!nom) return;

const code = prompt("PIN ?");
if(!code) return;

const r = await fetch(
'/api/add-user-admin?nom='+
encodeURIComponent(nom)+
'&pin='+code
);

const txt = await r.text();

alert(txt);

loadUsers();
}

/* ========= TAKE ========= */

async function takeTool(){

if(!user){
alert("Connecte-toi");
return;
}

const id = document.getElementById("toolId").value;

const r = await fetch(
'/api/take?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+id
);

const txt = await r.text();

alert(txt);
}

/* ========= RETURN ========= */

async function returnTool(){

if(!user){
alert("Connecte-toi");
return;
}

const id = document.getElementById("toolId").value;

const r = await fetch(
'/api/return?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+id
);

const txt = await r.text();

alert(txt);
}

/* ========= AUTO ========= */

loadUsers();
</script>

</body>
</html>
