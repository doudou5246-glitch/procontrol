<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin ProControl</title>

<style>
body{
margin:0;
font-family:Arial;
background:#06142b;
color:white;
padding:30px;
}
.box{
background:#162845;
padding:25px;
border-radius:18px;
margin-bottom:25px;
}
h1,h2{margin-top:0}
input{
padding:14px;
border:none;
border-radius:10px;
width:100%;
font-size:18px;
margin-bottom:10px;
}
button{
padding:12px 18px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
font-weight:bold;
margin-right:6px;
margin-bottom:6px;
}
.green{background:#19c15f;color:white;}
.red{background:#ff4c4c;color:white;}
.blue{background:#2e6cff;color:white;}
.gray{background:#4b5d7d;color:white;}
table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}
td,th{
padding:12px;
border-bottom:1px solid #31486e;
text-align:left;
vertical-align:top;
}
.small{
font-size:13px;
opacity:.8;
}
</style>
</head>

<body>

<div class="box">
<h1>🔐 Admin ProControl</h1>
<button class="blue" onclick="load()">Actualiser</button>
</div>

<div class="box">
<h2>🧰 Ajouter outil</h2>
<input id="toolName" placeholder="Nom matériel">
<button class="green" onclick="addTool()">Ajouter</button>
</div>

<div class="box">
<h2>👤 Ajouter utilisateur</h2>
<input id="userName" placeholder="Prénom">
<input id="userPin" placeholder="PIN">
<button class="green" onclick="addUser()">Ajouter</button>
</div>

<div class="box">
<h2>🧰 Outils</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nom</th>
<th>Statut</th>
<th>Utilisateur</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tools"></tbody>
</table>
</div>

<div class="box">
<h2>👤 Utilisateurs</h2>

<table>
<thead>
<tr>
<th>Nom</th>
<th>PIN</th>
<th>Action</th>
</tr>
</thead>

<tbody id="users"></tbody>
</table>
</div>

<script>

async function load(){

const r = await fetch('/api/admin');
const data = await r.json();

/* ===== TOOLS ===== */

let html='';

data.tools.forEach(t=>{

html += `
<tr>
<td>${t.id}</td>
<td>${t.nom}</td>
<td>${t.en_cours ? '🔴 Pris':'🟢 Libre'}</td>
<td>${t.emprunteur || '-'}</td>

<td>

<button class="blue"
onclick="openQR('${t.id}')">
QR
</button>

<button class="gray"
onclick="copyLink('${t.id}')">
Lien
</button>

<button class="red"
onclick="delTool('${t.id}')">
Supprimer
</button>

</td>
</tr>
`;

});

document.getElementById("tools").innerHTML = html;

/* ===== USERS ===== */

html='';

data.users.forEach(u=>{

html += `
<tr>
<td>${u.nom}</td>
<td>${u.pin}</td>

<td>
<button class="red"
onclick="delUser('${u.id}')">
Supprimer
</button>
</td>

</tr>
`;

});

document.getElementById("users").innerHTML = html;
}

/* ===== ADD TOOL ===== */

async function addTool(){

const nom =
document.getElementById("toolName").value;

await fetch(
'/api/add-tool?nom='+
encodeURIComponent(nom)
);

document.getElementById("toolName").value='';

load();
}

/* ===== ADD USER ===== */

async function addUser(){

const nom =
document.getElementById("userName").value;

const pin =
document.getElementById("userPin").value;

await fetch(
'/api/add-user-admin?nom='+
encodeURIComponent(nom)+
'&pin='+pin
);

document.getElementById("userName").value='';
document.getElementById("userPin").value='';

load();
}

/* ===== DELETE ===== */

async function delTool(id){

await fetch('/api/delete-tool?id='+id);

load();
}

async function delUser(id){

await fetch('/api/delete-user?id='+id);

load();
}

/* ===== QR ===== */

function openQR(id){

window.open('/qrcode/'+id,'_blank');
}

async function copyLink(id){

const url =
window.location.origin+
'/outil.html?tool='+id;

await navigator.clipboard.writeText(url);

alert("Lien copié");
}

load();

</script>

</body>
</html>
