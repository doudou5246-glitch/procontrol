<!DOCTYPE html>
<html>
<head>
  <title>Admin ProControl</title>
  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    h1 {
      text-align:center;
    }

    .card {
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    input, button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:6px;
    }

    button {
      background:#22c55e;
      color:white;
      cursor:pointer;
    }

    .danger {
      background:#ef4444;
    }

    table {
      width:100%;
      margin-top:10px;
    }

    td {
      padding:8px;
      border-bottom:1px solid #334155;
    }
  </style>
</head>
<body>

<h1>🛠️ Admin ProControl</h1>

<div class="card">
  <h2>Ajouter un outil</h2>
  <input id="tool" placeholder="Nom outil">
  <button onclick="addTool()">Ajouter</button>
</div>

<div class="card">
  <h2>Suivi matériel</h2>
  <button onclick="load()">Actualiser</button>

  <table id="table"></table>
</div>

<div class="card">
  <h2>Historique</h2>
  <div id="logs"></div>
</div>

<script>
async function load() {
  const res = await fetch('/api/admin');
  const data = await res.json();

  const table = document.getElementById("table");
  table.innerHTML = "";

  data.tools.forEach(t => {
    table.innerHTML += `
      <tr>
        <td>${t.nom}</td>
        <td>${t.en_cours ? "🔴 Pris" : "🟢 Libre"}</td>
        <td>${t.emprunteur || "-"}</td>
      </tr>
    `;
  });

  const logs = document.getElementById("logs");
  logs.innerHTML = "";

  data.mouvements.forEach(m => {
    logs.innerHTML += `<p>${m.utilisateur} → ${m.action}</p>`;
  });
}

async function addTool() {
  const nom = document.getElementById("tool").value;

  await fetch(`/api/add-tool?nom=${nom}`);
  load();
}

load();
</script>

</body>
</html>
