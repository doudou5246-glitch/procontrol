<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ProControl App</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#07162c;
color:white;
padding:20px;
}
.box{
background:#162845;
padding:22px;
border-radius:18px;
margin-bottom:18px;
}
h1,h2{margin-top:0}
input,select{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
margin-bottom:10px;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
margin-bottom:10px;
cursor:pointer;
}
.blue{background:#2e6cff;color:white;}
.green{background:#19c15f;color:white;}
.red{background:#ff4c4c;color:white;}
.gray{background:#4b5d7d;color:white;}
.small{font-size:14px;opacity:.8;}
#reader{margin-top:10px}
.tool{
background:#24395f;
padding:12px;
border-radius:12px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="box">
<h1>📱 ProControl</h1>
<div id="status">Non connecté</div>
</div>

<div class="box">
<h2>Connexion</h2>

<select id="nom"></select>
<input id="pin" placeholder="PIN" type="password">

<button class="blue" onclick="login()">Se connecter</button>
<button class="gray" onclick="changeUser()">Changer d'utilisateur</button>
<button class="green" onclick="createUser()">Créer un profil depuis l'appli</button>
</div>

<div class="box">
<h2>Scanner / saisir outil</h2>

<input id="toolId" placeholder="ID ou nom outil">

<button class="blue" onclick="startScanner()">📷 Scanner QR</button>
<button class="gray" onclick="stopScanner()">Fermer caméra</button>

<div id="reader"></div>

<button class="green" onclick="takeTool()">Prendre outil</button>
<button class="red" onclick="returnTool()">Rendre outil</button>

<div class="small">
Tu peux scanner un QR, taper l’ID, ou taper le nom exact de l’outil.
</div>
</div>

<div class="box">
<h2>Mes outils empruntés</h2>
<button class="blue" onclick="loadMyTools()">Actualiser</button>
<button class="red" onclick="returnAll()">Tout rendre</button>
<div id="myTools"></div>
</div>

<script>
let user="";
let pin="";
let scanner=null;
let tools=[];

/* ========= DATA ========= */

async function loadData(){
const r = await fetch('/api/admin');
const data = await r.json();

tools = data.tools || [];

let html='';

(data.users || []).forEach(u=>{
html += `<option value="${u.nom}">${u.nom}</option>`;
});

document.getElementById("nom").innerHTML = html;

const last = localStorage.getItem("pc_user");
if(last){
document.getElementById("nom").value = last;
}
}

/* ========= LOGIN ========= */

function login(){

user = document.getElementById("nom").value;
pin = document.getElementById("pin").value;

if(!user || !pin){
alert("Nom + PIN obligatoire");
return;
}

localStorage.setItem("pc_user", user);
sessionStorage.setItem("pc_user", user);
sessionStorage.setItem("pc_pin", pin);

document.getElementById("status").innerHTML =
"✅ Connecté : "+user;

loadMyTools();
}

function restoreSession(){
user = sessionStorage.getItem("pc_user") || "";
pin = sessionStorage.getItem("pc_pin") || "";

if(user){
document.getElementById("status").innerHTML =
"✅ Connecté : "+user;
}
}

/* ========= CHANGE USER ========= */

function changeUser(){
sessionStorage.clear();
document.getElementById("pin").value="";
document.getElementById("status").innerHTML="Non connecté";
user="";
pin="";
}

/* ========= CREATE USER ========= */

async function createUser(){

const nom = prompt("Prénom ?");
if(!nom) return;

const code = prompt("PIN ?");
if(!code) return;

const r = await fetch(
'/api/add-user-admin?nom='+
encodeURIComponent(nom)+
'&pin='+code
);

const txt = await r.text();

alert(txt);

await loadData();
document.getElementById("nom").value = nom;
}

/* ========= FIND TOOL ========= */

function getToolId(){
function normalize(str){
return String(str || "")
.toLowerCase()
.trim()
.replace(/\s+/g," ");
}

function getToolId(){

let value = normalize(
document.getElementById("toolId").value
);

if(!value) return "";

/* recherche par ID */
let byId = tools.find(t =>
String(t.id) === value
);

if(byId) return byId.id;

/* recherche nom exact */
let byName = tools.find(t =>
normalize(t.nom) === value
);

if(byName) return byName.id;

/* recherche partielle */
let partial = tools.find(t =>
normalize(t.nom).includes(value)
);

if(partial) return partial.id;

return "";
}

/* ========= TAKE ========= */

async function takeTool(){

if(!user || !pin){
alert("Connecte-toi d'abord");
return;
}

const id = getToolId();

const r = await fetch(
'/api/take?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+id
);

const txt = await r.text();

alert(txt);

await loadData();
await loadMyTools();
}

/* ========= RETURN ========= */

async function returnTool(){

if(!user || !pin){
alert("Connecte-toi d'abord");
return;
}

const id = getToolId();

const r = await fetch(
'/api/return?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+id
);

const txt = await r.text();

alert(txt);

await loadData();
await loadMyTools();
}

/* ========= MY TOOLS ========= */

async function loadMyTools(){

if(!user || !pin){
document.getElementById("myTools").innerHTML =
"<div class='small'>Connecte-toi pour voir tes outils.</div>";
return;
}

const r = await fetch('/api/admin');
const data = await r.json();

let my = (data.tools || []).filter(t => t.emprunteur === user);

let html = "";

my.forEach(t=>{
html += `
<div class="tool">
<b>${t.nom}</b><br>
ID : ${t.id}<br>
<button class="red" onclick="returnOne('${t.id}')">Rendre</button>
</div>
`;
});

document.getElementById("myTools").innerHTML =
html || "<div class='small'>Aucun outil emprunté.</div>";
}

async function returnOne(id){

const r = await fetch(
'/api/return?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+id
);

const txt = await r.text();
alert(txt);

await loadData();
await loadMyTools();
}

async function returnAll(){

if(!user || !pin){
alert("Connecte-toi");
return;
}

const r = await fetch('/api/admin');
const data = await r.json();

let my = (data.tools || []).filter(t => t.emprunteur === user);

for(const t of my){
await fetch(
'/api/return?nom='+
encodeURIComponent(user)+
'&pin='+pin+
'&id='+t.id
);
}

alert("Tout rendu");

await loadData();
await loadMyTools();
}

/* ========= QR SCANNER ========= */

function extractToolId(text){

try{
const url = new URL(text);
const id = url.searchParams.get("tool") || url.searchParams.get("id");
if(id) return id;
}catch(e){}

return text;
}

async function startScanner(){

if(scanner){
return;
}

scanner = new Html5Qrcode("reader");

await scanner.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },
decodedText => {
const id = extractToolId(decodedText);
document.getElementById("toolId").value = id;
stopScanner();
}
);
}

async function stopScanner(){

if(scanner){
await scanner.stop();
await scanner.clear();
scanner=null;
}
}

/* ========= INIT ========= */

async function init(){
await loadData();
restoreSession();

const params = new URLSearchParams(window.location.search);
const tool = params.get("tool") || params.get("id");

if(tool){
document.getElementById("toolId").value = tool;
}
}

init();
</script>

</body>
</html>
