<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProControl</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:90%;
  max-width:400px;
  text-align:center;
}

input {
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  font-size:18px;
}

button {
  width:100%;
  padding:18px;
  margin:10px 0;
  font-size:20px;
  border:none;
  border-radius:10px;
  color:white;
}

.take { background:#ef4444; }
.return { background:#22c55e; }

h1 {
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔧 Outil</h1>

  <input id="nom" placeholder="Votre prénom">
  <input id="pin" placeholder="Code PIN" type="password">

  <button class="take" onclick="prendre()">🔴 PRENDRE</button>
  <button class="return" onclick="rendre()">🟢 RENDRE</button>
</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");

function prendre() {
  const nom = document.getElementById("nom").value;
  const pin = document.getElementById("pin").value;

  fetch(`/api/take?id=${id}&nom=${nom}&pin=${pin}`)
    .then(r => r.text())
    .then(alert);
}

function rendre() {
  const nom = document.getElementById("nom").value;
  const pin = document.getElementById("pin").value;

  fetch(`/api/return?id=${id}&nom=${nom}&pin=${pin}`)
    .then(r => r.text())
    .then(alert);
}
</script>

</body>
</html>
