<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ProControl</title>

<style>
body{
margin:0;
font-family:Arial;
background:#08192f;
color:white;
padding:20px;
}
.box{
background:#162845;
padding:22px;
border-radius:18px;
margin-bottom:20px;
}
h1,h2{
margin-top:0;
}
input,select{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
margin-bottom:10px;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}
.blue{background:#2e6cff;color:white;}
.green{background:#19c15f;color:white;}
.red{background:#ff4c4c;color:white;}
.small{
font-size:14px;
opacity:.8;
}
</style>
</head>

<body>

<div class="box">
<h1>📱 ProControl</h1>
<div class="small">Connexion utilisateur</div>
</div>

<div class="box">
<h2>👤 Profil</h2>

<select id="nom"></select>
<input id="pin" placeholder="PIN">

<button class="blue" onclick="connect()">Connexion</button>
<button class="green" onclick="newUser()">Créer profil</button>

<div id="status"></div>
</div>

<div class="box">
<h2>🧰 Matériel</h2>

<input id="toolId" placeholder="ID outil">

<button class="green" onclick="take()">Prendre</button>
<button class="red" onclick="give()">Rendre</button>

<div class="small">Scanne QR plus tard si besoin</div>
</div>

<script>
let currentUser="";
let currentPin="";

async function loadUsers(){

const r=await fetch('/api/admin');
const data=await r.json();

let html='';

data.users.forEach(u=>{
html+=`<option value="${u.nom}">${u.nom}</option>`;
});

document.getElementById("nom").innerHTML=html;

const saved=localStorage.getItem("lastUser");
if(saved) document.getElementById("nom").value=saved;
}

function connect(){

currentUser=document.getElementById("nom").value;
currentPin=document.getElementById("pin").value;

localStorage.setItem("lastUser",currentUser);

document.getElementById("status").innerHTML="✅ Connecté : "+currentUser;
}

async function newUser(){

const nom=prompt("Prénom ?");
const pin=prompt("PIN ?");

if(!nom || !pin) return;

await fetch('/api/add-user-admin?nom='+encodeURIComponent(nom)+'&pin='+pin);

loadUsers();
}

async function take(){

const id=document.getElementById("toolId").value;

const r=await fetch('/api/take?nom='+encodeURIComponent(currentUser)+'&pin='+currentPin+'&id='+id);
const txt=await r.text();

alert(txt);
}

async function give(){

const id=document.getElementById("toolId").value;

const r=await fetch('/api/return?nom='+encodeURIComponent(currentUser)+'&pin='+currentPin+'&id='+id);
const txt=await r.text();

alert(txt);
}

loadUsers();
</script>

</body>
</html>
