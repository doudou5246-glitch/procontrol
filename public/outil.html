<script>
function saveUser() {
  const nom = document.getElementById("nom").value;
  const pin = document.getElementById("pin").value;

  if (!nom || !pin) {
    alert("Entre ton nom et ton PIN");
    return false;
  }

  localStorage.setItem("user_nom", nom);
  localStorage.setItem("user_pin", pin);
  return true;
}

function loadUser() {
  document.getElementById("nom").value = localStorage.getItem("user_nom") || "";
  document.getElementById("pin").value = localStorage.getItem("user_pin") || "";
}

async function prendre() {
  if (!saveUser()) return;

  const nom = localStorage.getItem("user_nom");
  const pin = localStorage.getItem("user_pin");
  const id = new URLSearchParams(window.location.search).get("id");

  try {
    const res = await fetch(`/api/prendre?id=${id}&nom=${nom}&pin=${pin}`);
    const txt = await res.text();

    alert(txt);
  } catch (err) {
    alert("Erreur serveur");
    console.error(err);
  }
}

async function rendre() {
  if (!saveUser()) return;

  const nom = localStorage.getItem("user_nom");
  const pin = localStorage.getItem("user_pin");
  const id = new URLSearchParams(window.location.search).get("id");

  try {
    const res = await fetch(`/api/rendre?id=${id}&nom=${nom}&pin=${pin}`);
    const txt = await res.text();

    alert(txt);
  } catch (err) {
    alert("Erreur serveur");
    console.error(err);
  }
}

function logout() {
  localStorage.clear();
  location.reload();
}

window.onload = loadUser;
</script>
