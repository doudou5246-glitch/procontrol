<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin ProControl</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#07142c;
color:#fff;
padding:30px;
}
.wrap{
max-width:1400px;
margin:auto;
}
.card{
background:#142544;
border-radius:18px;
padding:25px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,.35);
}
h1{
font-size:42px;
margin-bottom:20px;
}
h2{
font-size:30px;
margin-bottom:20px;
}
.grid4{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}
.stat{
background:#1c335e;
padding:20px;
border-radius:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}
input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
margin-bottom:12px;
}
.row{
display:grid;
grid-template-columns:1fr 1fr auto;
gap:10px;
}
button{
border:none;
padding:13px 18px;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
.blue{background:#2d6cff;color:#fff}
.green{background:#18b64b;color:#fff}
.red{background:#e53935;color:#fff}
.gray{background:#4e5f80;color:#fff}
table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}
th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.08);
text-align:left;
font-size:16px;
}
th{color:#8fb3ff}
.small{
font-size:14px;
opacity:.8;
}
.actions button{
margin-right:6px;
margin-bottom:5px;
}
@media(max-width:1000px){
.grid4{grid-template-columns:1fr 1fr}
.row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="wrap">

<div class="card">
<h1>🔐 Admin ProControl</h1>

<div class="row">
<input id="adminUser" placeholder="Utilisateur admin" value="admin">
<input id="adminPass" placeholder="Mot de passe admin" type="password">
<button class="blue" onclick="login()">Connexion</button>
</div>

<div style="margin-top:10px">
<button class="gray" onclick="logout()">Déconnexion</button>
<button class="blue" onclick="loadAll()">Actualiser</button>
</div>
</div>

<div class="grid4">
<div class="stat">Outils<br><span id="s1">0</span></div>
<div class="stat">Pris<br><span id="s2">0</span></div>
<div class="stat">Libres<br><span id="s3">0</span></div>
<div class="stat">Utilisateurs<br><span id="s4">0</span></div>
</div>

<div class="card">
<h2>🧰 Ajouter un outil</h2>
<div class="row">
<input id="toolName" placeholder="Nom du matériel">
<div></div>
<button class="green" onclick="addTool()">Ajouter</button>
</div>
</div>

<div class="card">
<h2>👤 Ajouter utilisateur</h2>
<div class="row">
<input id="userName" placeholder="Prénom">
<input id="userPin" placeholder="PIN">
<button class="green" onclick="addUser()">Ajouter</button>
</div>
</div>

<div class="card">
<h2>🧰 Liste matériel</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>Nom</th>
<th>Statut</th>
<th>Utilisateur</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tools"></tbody>
</table>
</div>

<div class="card">
<h2>👤 Utilisateurs</h2>
<table>
<thead>
<tr>
<th>Nom</th>
<th>PIN</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="users"></tbody>
</table>
</div>

<div class="card">
<h2>📜 Historique</h2>
<table>
<thead>
<tr>
<th>Date</th>
<th>Utilisateur</th>
<th>Action</th>
<th>Outil</th>
</tr>
</thead>
<tbody id="logs"></tbody>
</table>
</div>

</div>

<script>
function saveSession(){
sessionStorage.setItem("auser",document.getElementById("adminUser").value);
sessionStorage.setItem("apass",document.getElementById("adminPass").value);
}

function login(){
saveSession();
loadAll();
}

function logout(){
sessionStorage.clear();
location.reload();
}

function auth(){
return {
u:sessionStorage.getItem("auser") || "admin",
p:sessionStorage.getItem("apass") || ""
};
}

async function loadAll(){

const a = auth();

const r = await fetch(`/api/admin?user=${a.u}&pass=${a.p}`);
const data = await r.json();

renderStats(data);
renderTools(data.tools || []);
renderUsers(data.users || []);
renderLogs(data.mouvements || []);
}

function renderStats(d){

const t = d.tools || [];
const u = d.users || [];

document.getElementById("s1").innerText = t.length;
document.getElementById("s2").innerText = t.filter(x=>x.en_cours).length;
document.getElementById("s3").innerText = t.filter(x=>!x.en_cours).length;
document.getElementById("s4").innerText = u.length;
}

function renderTools(list){

let html="";

list.forEach(x=>{

html+=`
<tr>
<td>${x.id}</td>
<td>${x.nom}</td>
<td>${x.en_cours ? "🔴 Pris" : "🟢 Libre"}</td>
<td>${x.emprunteur || "-"}</td>
<td class="actions">
<button class="blue" onclick="window.open('/qrcode/${x.id}','_blank')">QR</button>
<button class="red" onclick="delTool(${x.id})">Supprimer</button>
</td>
</tr>
`;

});

document.getElementById("tools").innerHTML = html;
}

function renderUsers(list){

let html="";

list.forEach(x=>{

html+=`
<tr>
<td>${x.nom}</td>
<td>${x.pin}</td>
<td class="actions">
<button class="blue" onclick="changePin('${x.nom}')">PIN</button>
<button class="red" onclick="delUser('${x.nom}')">Supprimer</button>
</td>
</tr>
`;

});

document.getElementById("users").innerHTML = html;
}

function renderLogs(list){

let html="";

list.reverse().slice(0,50).forEach(x=>{

html+=`
<tr>
<td>${x.date || "-"}</td>
<td>${x.utilisateur || "-"}</td>
<td>${x.action || "-"}</td>
<td>${x.tool_nom || "-"}</td>
</tr>
`;

});

document.getElementById("logs").innerHTML = html;
}

async function addTool(){

const nom = document.getElementById("toolName").value;
if(!nom) return;

const a = auth();

await fetch(`/api/add-tool?user=${a.u}&pass=${a.p}&nom=${encodeURIComponent(nom)}`);

document.getElementById("toolName").value="";
loadAll();
}

async function addUser(){

const nom = document.getElementById("userName").value;
const pin = document.getElementById("userPin").value;

if(!nom || !pin) return;

const a = auth();

await fetch(`/api/add-user-admin?user=${a.u}&pass=${a.p}&nom=${encodeURIComponent(nom)}&pin=${pin}`);

document.getElementById("userName").value="";
document.getElementById("userPin").value="";

loadAll();
}

async function delTool(id){

if(!confirm("Supprimer ?")) return;

const a = auth();

await fetch(`/api/delete-tool?user=${a.u}&pass=${a.p}&id=${id}`);

loadAll();
}

async function delUser(nom){

if(!confirm("Supprimer utilisateur ?")) return;

const a = auth();

await fetch(`/api/delete-user?user=${a.u}&pass=${a.p}&nom=${encodeURIComponent(nom)}`);

loadAll();
}

async function changePin(nom){

const pin = prompt("Nouveau PIN ?");
if(!pin) return;

const a = auth();

await fetch(`/api/reset-pin?user=${a.u}&pass=${a.p}&nom=${encodeURIComponent(nom)}&pin=${pin}`);

loadAll();
}

window.onload=()=>{
document.getElementById("adminUser").value=sessionStorage.getItem("auser") || "admin";
document.getElementById("adminPass").value=sessionStorage.getItem("apass") || "";
if(sessionStorage.getItem("auser")) loadAll();
}

setInterval(()=>{
if(sessionStorage.getItem("auser")) loadAll();
},5000);
</script>

</body>
</html>
