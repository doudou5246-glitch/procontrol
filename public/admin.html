<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: Arial; background:#0f172a; color:white; }
.card { background:#1e293b; padding:20px; margin:20px; border-radius:10px; }
</style>
</head>

<body>

<h1>📊 Dashboard</h1>

<div class="card">
<h2>Outils</h2>
<div id="tools"></div>
</div>

<div class="card">
<h2>Utilisateurs</h2>
<div id="users"></div>
</div>

<script>

async function load() {
  const res = await fetch('/api/admin');
  const data = await res.json();

  document.getElementById("tools").innerHTML =
    data.tools.map(t => `
      ${t.nom} → ${t.en_cours ? "🔴 " + t.emprunteur : "🟢 Libre"}<br>
    `).join("");

  document.getElementById("users").innerHTML =
    data.users.map(u => `${u.nom}<br>`).join("");
}

load();

</script>

</body>
</html>
