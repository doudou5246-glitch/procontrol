<!DOCTYPE html>
<html>
<head>
  <title>ProControl</title>
</head>
<body>

<h1>🔧 ProControl</h1>

<label>Nom :</label><br>
<input id="nom"><br><br>

<label>PIN :</label><br>
<input id="pin" type="password"><br><br>

<label>ID outil :</label><br>
<input id="id"><br><br>

<button onclick="prendre()">Prendre</button>
<button onclick="rendre()">Rendre</button>

<p id="resultat"></p>

<script>
async function prendre() {
  const nom = document.getElementById('nom').value;
  const pin = document.getElementById('pin').value;
  const id = document.getElementById('id').value;

  const res = await fetch(`/api/take?id=${id}&nom=${nom}&pin=${pin}`);
  const txt = await res.text();

  document.getElementById('resultat').innerText = txt;
}

async function rendre() {
  const nom = document.getElementById('nom').value;
  const pin = document.getElementById('pin').value;
  const id = document.getElementById('id').value;

  const res = await fetch(`/api/return?id=${id}&nom=${nom}&pin=${pin}`);
  const txt = await res.text();

  document.getElementById('resultat').innerText = txt;
}
</script>

</body>
</html>
<h2>📦 Suivi du matériel</h2>
<button onclick="charger()">Actualiser</button>

<ul id="liste"></ul>

<script>
async function charger() {
  const res = await fetch("/api/tools");
  const data = await res.json();

  const liste = document.getElementById("liste");
  liste.innerHTML = "";

  data.forEach(tool => {
    const li = document.createElement("li");

    if (tool.en_cours) {
      li.innerText = tool.nom + " → 🔴 pris par " + tool.emprunteur;
    } else {
      li.innerText = tool.nom + " → 🟢 disponible";
    }

    liste.appendChild(li);
  });
}
</script>
