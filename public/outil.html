<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  margin: auto;
  margin-top: 40px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

.take { background: red; color: white; }
.return { background: green; color: white; }
.create { background: #3b82f6; color: white; }

</style>
</head>

<body>

<div class="card">
<h2>🔧 Outil</h2>

<select id="nom"></select>
<input id="pin" placeholder="PIN">

<button class="create" onclick="createUser()">Créer compte</button>
<button class="take" onclick="take()">Prendre</button>
<button class="return" onclick="give()">Rendre</button>

</div>

<script>

const id = new URLSearchParams(window.location.search).get("id");

async function loadUsers() {
  const res = await fetch('/api/admin');
  const data = await res.json();

  const select = document.getElementById("nom");
  select.innerHTML = "";

  data.users.forEach(u => {
    const opt = document.createElement("option");
    opt.value = u.nom;
    opt.text = u.nom;
    select.appendChild(opt);
  });
}

async function createUser() {
  const nom = prompt("Nom ?");
  const pin = prompt("PIN ?");

  await fetch(`/api/add-user?nom=${nom}&pin=${pin}`);
  loadUsers();
}

async function take() {
  const nom = document.getElementById("nom").value;
  const pin = document.getElementById("pin").value;

  await fetch(`/api/take?id=${id}&nom=${nom}&pin=${pin}`);
  alert("Pris !");
}

async function give() {
  await fetch(`/api/return?id=${id}`);
  alert("Rendu !");
}

loadUsers();

</script>

</body>
</html>
