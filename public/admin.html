<!DOCTYPE html>
<html>
<head>
  <title>ProControl Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .status {
      font-size: 14px;
      margin-top: 10px;
    }

    .pris {
      color: #ef4444;
    }

    .libre {
      color: #22c55e;
    }

    button {
      padding: 10px;
      margin: 20px auto;
      display: block;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📊 Gestion matériel</h1>

<button onclick="load()">🔄 Actualiser</button>

<div class="grid" id="grid"></div>

<script>
async function load() {
  const res = await fetch("/api/admin");
  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.tools.forEach(tool => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">🔧 ${tool.nom}</div>

      <div class="status ${tool.en_cours ? 'pris' : 'libre'}">
        ${tool.en_cours ? 
          "🔴 Pris par " + tool.emprunteur :
          "🟢 Disponible"}
      </div>

      <div>
        📅 ${tool.date_sortie || "-"}
      </div>
    `;

    grid.appendChild(card);
  });
}

load();
</script>

</body>
</html>
