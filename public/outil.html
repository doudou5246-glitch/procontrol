<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
  margin-top: 40px;
}

select, input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

.take { background: red; color:white; }
.return { background: green; color:white; }
.logout { background: gray; color:white; }
</style>
</head>

<body>

<div class="card">
<h2>🔧 Outil</h2>

<select id="nom"></select>
<input id="pin" placeholder="PIN" type="password">

<button class="take" onclick="login()">Se connecter</button>
<button class="take" onclick="take()">Prendre</button>
<button class="return" onclick="give()">Rendre</button>
<button class="logout" onclick="logout()">Changer utilisateur</button>

</div>

<script>

const id = new URLSearchParams(window.location.search).get("id");

// SESSION (pas localStorage)
function saveSession(nom, pin) {
  sessionStorage.setItem("nom", nom);
  sessionStorage.setItem("pin", pin);
}

function getSession() {
  return {
    nom: sessionStorage.getItem("nom"),
    pin: sessionStorage.getItem("pin")
  };
}

function logout() {
  sessionStorage.clear();
  alert("Déconnecté");
}

// charger users
async function loadUsers() {
  const res = await fetch('/api/admin');
  const data = await res.json();

  const select = document.getElementById("nom");
  select.innerHTML = "";

  data.users.forEach(u => {
    const opt = document.createElement("option");
    opt.value = u.nom;
    opt.text = u.nom;
    select.appendChild(opt);
  });
}

// LOGIN (1 seule fois)
function login() {
  const nom = document.getElementById("nom").value;
  const pin = document.getElementById("pin").value;

  if (!nom || !pin) return alert("Nom + PIN requis");

  saveSession(nom, pin);
  alert("Connecté");
}

// PRENDRE
async function take() {
  const { nom, pin } = getSession();

  if (!nom || !pin) {
    return alert("Connecte-toi d'abord");
  }

  const res = await fetch(`/api/take?id=${id}&nom=${nom}&pin=${pin}`);
  alert(await res.text());
}

// RENDRE
async function give() {
  const { nom } = getSession();

  if (!nom) return alert("Connecte-toi");

  const res = await fetch(`/api/return?id=${id}&nom=${nom}`);
  alert(await res.text());
}

loadUsers();

</script>

</body>
</html>
