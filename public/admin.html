<!DOCTYPE html>
<html>
<head>
  <title>Admin ProControl</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    .add {
      background: #22c55e;
      color: white;
    }

    .delete {
      background: #ef4444;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>⚙️ ADMIN PROCONTROL</h1>

<h2>➕ Ajouter outil</h2>
<input id="toolName" placeholder="Nom outil">
<button class="add" onclick="addTool()">Ajouter</button>

<h2>👤 Ajouter utilisateur</h2>
<input id="userName" placeholder="Nom">
<input id="userPin" placeholder="PIN">
<button class="add" onclick="addUser()">Créer</button>

<h2>📦 Matériel</h2>
<div id="tools"></div>

<h2>👥 Utilisateurs</h2>
<div id="users"></div>

<script>

async function load() {
  const res = await fetch("/api/admin");
  const data = await res.json();

  // outils
  const toolsDiv = document.getElementById("tools");
  toolsDiv.innerHTML = "";

  data.tools.forEach(t => {
    toolsDiv.innerHTML += `
      <div class="card">
        🔧 ${t.nom} (ID: ${t.id})<br>
        ${t.en_cours ? "🔴 Pris par " + t.emprunteur : "🟢 Libre"}
      </div>
    `;
  });

  // users
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  data.users.forEach(u => {
    usersDiv.innerHTML += `
      <div class="card">
        👤 ${u.nom} (PIN: ${u.pin})
        <button class="delete" onclick="deleteUser('${u.nom}')">Supprimer</button>
      </div>
    `;
  });
}

async function addTool() {
  const name = document.getElementById("toolName").value;
  await fetch("/api/add-tool?nom=" + name);
  load();
}

async function addUser() {
  const nom = document.getElementById("userName").value;
  const pin = document.getElementById("userPin").value;

  await fetch(`/api/add-user?nom=${nom}&pin=${pin}`);
  load();
}

async function deleteUser(nom) {
  await fetch(`/api/delete-user?nom=${nom}`);
  load();
}

load();

</script>

</body>
</html>
